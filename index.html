<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Business Planner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>AI Business Planner</h1>
    <p>Generate smart business ideas based on your budget & skills</p>

    <div class="card">

        <input type="number" id="budget" placeholder="Enter your budget">

        <select id="skill">
            <option value="">Select Skill</option>
            <option value="Marketing">Marketing</option>
            <option value="Design">Design</option>
            <option value="Tech">Tech</option>
            <option value="Sales">Sales</option>
        </select>

        <button onclick="generateIdea()">Generate Idea</button>

    </div>

    <div class="result-card" id="result">
        Your AI-generated business idea will appear here...
    </div>
<div style="text-align:center;">
    <button onclick="clearHistory()" class="clear-btn">Clear History</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
